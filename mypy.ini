; mypy configuration for JARVIS AI Assistant.
; Targets Python 3.11+, strict-ish defaults appropriate for an async voice
; pipeline with many third-party native libs (pywin32, pycaw, wmi, pyaudio).
; The src/ layout matches the design's project structure; tests live in tests/.

[mypy]
python_version = 3.11
mypy_path = src
packages = jarvis
namespace_packages = True
explicit_package_bases = True
files = src, tests
plugins = pydantic.mypy

; Strictness — kept high but not "strict = True" so individual modules can
; tighten or loosen as features land.
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
warn_unreachable = True
no_implicit_optional = True
strict_equality = True

disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
disallow_any_generics = True
check_untyped_defs = True

; ``strict_concatenate`` was renamed to ``extra_checks`` in mypy 1.11.
; Keep the new name to silence the deprecation warning on mypy 1.11+.
extra_checks = True

show_error_codes = True
show_column_numbers = True
pretty = True
color_output = True

; Tests can stay slightly looser; Hypothesis strategies often have inferred
; types that would otherwise require verbose annotations.
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
; Tests carry many ``# type: ignore[...]`` directives that are still needed
; on older mypy / pydantic-plugin combinations; avoid policing them in the
; per-PR feedback loop.
warn_unused_ignores = False

; Third-party libraries without bundled type information. These are expected
; per design.md (pvporcupine, silero-vad, faster-whisper, piper-tts, pycaw,
; wmi, pywinauto, pyautogui, win10toast, etc.).
[mypy-pvporcupine.*]
ignore_missing_imports = True

[mypy-silero_vad.*]
ignore_missing_imports = True

[mypy-faster_whisper.*]
ignore_missing_imports = True


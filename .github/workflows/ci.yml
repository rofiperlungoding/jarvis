name: CI

# CI skeleton for the JARVIS AI Assistant.
#
# Validates Requirements 15.1 (Windows 10/11 support) and 15.2 (platform
# abstraction) by running the test suite on both Windows and Linux runners.
# Windows-only smoke tests (e.g. WMI brightness, DPAPI, Win32 media keys,
# pywinauto, pyautogui) are gated behind the JARVIS_TEST_WINDOWS=1 environment
# variable so they execute only on the Windows runner.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Lint + format. Runs on Linux only — style is platform-agnostic, so spending
  # CI minutes on Windows for the same check buys nothing.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what lint/format need; avoids pulling Windows-only
          # runtime deps onto the Linux runner.
          pip install ruff black

      - name: Ruff lint
        run: ruff check src tests

      - name: Black format check
        run: black --check src tests

  # ---------------------------------------------------------------------------
  # Static type checking with mypy. Linux-only for the same reason as lint.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system audio libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 libsndfile1 ffmpeg

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src

  # ---------------------------------------------------------------------------
  # Unit + property tests on Windows and Linux.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system audio libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 libsndfile1 ffmpeg

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ----- Unit tests -------------------------------------------------------
      # On Linux, JARVIS_TEST_WINDOWS is *not* set, so Windows-only smoke tests
      # marked with `@pytest.mark.skipif(not os.environ.get("JARVIS_TEST_WINDOWS"))`
      # are skipped (Requirement 15.2 — platform abstraction).
      - name: Run unit tests (Linux)
        if: runner.os == 'Linux'
        run: |
          pytest tests \
            --ignore=tests/property \
            -v \
            --tb=short \
            --maxfail=10

      # On Windows, JARVIS_TEST_WINDOWS=1 enables Windows-only smoke tests
      # (Requirement 15.1 — Windows 10/11 support).
      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        env:
          JARVIS_TEST_WINDOWS: '1'
        run: |
          pytest tests \
            --ignore=tests/property \
            -v \
            --tb=short \
            --maxfail=10

      # ----- Property-based tests (Hypothesis) --------------------------------
      # Property tests live in tests/property/ and use Hypothesis. They are
      # platform-agnostic by design (the platform-specific surface is mocked
      # via FakePlatformAdapter), so they run on both runners. Same gating
      # rule applies: JARVIS_TEST_WINDOWS is set only on Windows.
      - name: Run property tests (Linux)
        if: runner.os == 'Linux'
        run: |
          pytest tests/property \
            -v \
            --tb=short \
            --hypothesis-show-statistics

      - name: Run property tests (Windows)
        if: runner.os == 'Windows'
        env:
          JARVIS_TEST_WINDOWS: '1'
        run: |
          pytest tests/property \
            -v \
            --tb=short \
            --hypothesis-show-statistics

  # ---------------------------------------------------------------------------
  # Aggregate gate so branch protection can require a single check.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: Verify required jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.typecheck.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
